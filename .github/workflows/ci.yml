name: ci

# PR時と develop 以外への push で型チェック・テスト・ビルドを回す（デプロイはしない）。
# develop への push は deploy-pages.yml が同等のゲートを兼ねるため、ここでは対象外にして二重実行を避ける。
on:
  pull_request:
  push:
    branches-ignore: [develop, gh-pages]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build -- --base=/smash-lab/
