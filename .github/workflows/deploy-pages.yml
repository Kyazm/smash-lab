name: deploy-pages

on:
  push:
    branches: [develop]
    # docs や設計ファイルのみの変更ではWebに影響しないためデプロイをスキップ（無駄なリビルド回避）。
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".context/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Typecheck
        run: npm run typecheck
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm run build -- --base=/smash-lab/
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_NOTES_PROVIDER: ${{ vars.VITE_NOTES_PROVIDER }}
      # SPAルーティングのフォールバック（docs/02: 404.html方式）
      - run: cp web/dist/index.html web/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
